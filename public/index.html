<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Психологический портал</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Наши стили -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/Мамонтов_К_Е_хакатон_EdTech/2912992.png">
</head>
<body>
    <!-- Хедер -->
    <header class="bg-primary text-white py-4 shadow">
        <div class="container">
            <h1 class="text-center fw-bold" id="portal-title">Психологический портал</h1>
        </div>
    </header>

    <!-- Навигация -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand fw-bold" id="portal" href="http://idcxnszt.ct.ws/%d0%9c%d0%b0%d0%bc%d0%be%d0%bd%d1%82%d0%be%d0%b2_%d0%9a_%d0%95_%d1%85%d0%b0%d0%ba%d0%b0%d1%82%d0%be%d0%bd_EdTech/index.phpl">Портал</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Переключить навигацию">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" id="home" href="http://idcxnszt.ct.ws/%d0%9c%d0%b0%d0%bc%d0%be%d0%bd%d1%82%d0%be%d0%b2_%d0%9a_%d0%95_%d1%85%d0%b0%d0%ba%d0%b0%d1%82%d0%be%d0%bd_EdTech/index.php">Главная</a></li>
                    <li class="nav-item"><a class="nav-link" id="contacts" href="http://idcxnszt.ct.ws/%d0%9c%d0%b0%d0%bc%d0%be%d0%bd%d1%82%d0%be%d0%b2_%d0%9a_%d0%95_%d1%85%d0%b0%d0%ba%d0%b0%d1%82%d0%be%d0%bd_EdTech/contacts.php">Контакты</a></li>
                    <li class="nav-item"><a class="nav-link" id="login" href="http://idcxnszt.ct.ws/%d0%9c%d0%b0%d0%bc%d0%be%d0%bd%d1%82%d0%be%d0%b2_%d0%9a_%d0%95_%d1%85%d0%b0%d0%ba%d0%b0%d1%82%d0%be%d0%bd_EdTech/login.php">Вход</a></li>
                    <li class="nav-item"><a class="nav-link" id="assistant" href="#">AI‑ассистент</a></li>
                    <li class="nav-item"><a class="nav-link" id="back" href="#" onclick="goBack()">Назад</a></li>
                </ul>
                <!-- Переключатель языков -->
                <div class="lang-switcher ms-3">
                    <button class="btn btn-light btn-sm" onclick="setLanguage('ru')">RU</button>
                    <button class="btn btn-light btn-sm" onclick="setLanguage('kz')">KZ</button>
                    <button class="btn btn-light btn-sm" onclick="setLanguage('eng')">ENG</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main class="container my-4">
        <div class="card shadow">
            <div class="card-body">
                <h2 class="card-title" id="chat-title">Чат с ИИ</h2>
                <div id="chat-box" class="chat-box mb-3"></div>
                <form id="chat-form" class="chat-form">
                    <input type="text" id="user-input" class="form-control" placeholder="Введите сообщение..." required>
                    <button type="submit" class="btn btn-primary" id="send-btn">Отправить</button>
                </form>
            </div>
        </div>
    </main>

    <!-- Футер -->
    <footer class="bg-primary text-white text-center py-3 mt-auto">
        <p id="footer-text">&copy; 2026 EdTech. Все права защищены.</p>
    </footer>

    <!-- JS -->
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
      const translations = {
        ru: {
          portalTitle: "Психологический портал",
          portal: "Портал",
          home: "Главная",
          contacts: "Контакты",
          login: "Вход",
          cabinet: "Личный кабинет",
          assistant: "AI‑ассистент",
          back: "Назад",
          chatTitle: "Чат с ИИ",
          sendBtn: "Отправить",
          footer: "© 2026 EdTech. Все права защищены."
        },
        kz: {
          portalTitle: "Психологиялық портал",
          portal: "Портал",
          home: "Басты бет",
          contacts: "Байланыс",
          login: "Кіру",
          cabinet: "Жеке кабинет",
          assistant: "AI‑көмекші",
          back: "Артқа",
          chatTitle: "ЖИ чат",
          sendBtn: "Жіберу",
          footer: "© 2026 EdTech. Барлық құқықтар қорғалған."
        },
        eng: {
          portalTitle: "Psychological Portal",
          portal: "Portal",
          home: "Home",
          contacts: "Contacts",
          login: "Login",
          cabinet: "Cabinet",
          assistant: "AI Assistant",
          back: "Back",
          chatTitle: "Chat with AI",
          sendBtn: "Send",
          footer: "© 2026 EdTech. All rights reserved."
        }
      };

      function setLanguage(lang) {
        document.getElementById("portal-title").textContent = translations[lang].portalTitle;
        document.getElementById("portal").textContent = translations[lang].portal;
        document.getElementById("home").textContent = translations[lang].home;
        document.getElementById("contacts").textContent = translations[lang].contacts;
        document.getElementById("login").textContent = translations[lang].login;
        document.getElementById("cabinet").textContent = translations[lang].cabinet;
        document.getElementById("assistant").textContent = translations[lang].assistant;
        document.getElementById("back").textContent = translations[lang].back;
        document.getElementById("chat-title").textContent = translations[lang].chatTitle;
        document.getElementById("send-btn").textContent = translations[lang].sendBtn;
        document.getElementById("footer-text").textContent = translations[lang].footer;
        localStorage.setItem("lang", lang);
      }

      function goBack() {
        window.history.back();
      }

      // При загрузке страницы восстанавливаем язык
      window.onload = () => {
        const savedLang = localStorage.getItem("lang") || "ru";
        setLanguage(savedLang);
      };
    </script>
</body>
</html>
